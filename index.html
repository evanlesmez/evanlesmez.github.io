<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles/index.css">  
    <script src="scripts/audioController.js"></script>
</head>   
<body>
<div class="nav-bar center-block">
    <ul>
        <li><a href="docs/gurus">gurus</a></li>
        <li><a href="docs/idears">idears</a></li>
        <li><a href="docs/playground">playground</a></li>
    </ul>
</div>
<div class="header">
    <h1>Wubalubadubdub!</h1>
</div>
<div class="page-wrapper">
    <div class="audio">
        <audio id="song" src="assets/koven-Never_Have_I_Felt_This[NCS].mp3" crossorigin="anonymous">
    </div>
    <canvas class= "center-block" id="audio-monitor" width="600" height="300">
            An alternative text describing what your canvas displays. 
    </canvas>
    <div class="custom-controls flex-container">
        <div class="flex-item">
            <button data-playing="false" role="switch" aria-checked="false">
                <span>Play/Pause</span>
            </button>
        </div>
        <div class="flex-item">
            <div class="center-block">
                <label for="volume">VOL</label>
            </div>
            <input type="range" id="volume" min="0" max="2" value="1" step="0.01" list="gain-vals"/>
        </div>
        <div class="flex-item">
            <div class="center-block">
                <label for="pan">PAN</label>
            </div>
            <input type="range" id="panner" min="-1" max="1" value="0" step="0.01" list="pan-vals"/>
        </div>
    </div>
    <div>
        <img src=" https://i.pinimg.com/originals/2b/6c/69/2b6c69c2c6fd2bd7c091696efbe57235.jpg"/>
        <img src="https://derpicdn.net/img/view/2012/10/14/121883__safe_solo_animated_edit_hub+logo_sonic+rainboom_avatar+the+last+airbender_avatar_atomic+rainboom_mushroom+cloud.gif"/>
        <img src="http://38.media.tumblr.com/a97e6b21873a97ca580d623be4cf8b18/tumblr_ngtsibBmkL1qcgu0vo4_500.gif"/>
        <img src="https://i.pinimg.com/originals/89/4e/78/894e7867687cfc70b8b7f05a955091ee.gif"/>
        <img src="https://animatedmeta.files.wordpress.com/2015/02/avatarintro.gif"/>
        <img src="https://media2.giphy.com/media/A4i2dzfc52Sli/giphy.gif"/>
        <img src="https://i.pinimg.com/originals/fc/2b/9f/fc2b9f50e7bcb12d897d0c4cd358b76e.gif"/>
        <img src="https://media.tenor.co/images/f234f7dab3ca899f230aebb3efb90c91/raw"/>
        <img src="https://i.kym-cdn.com/photos/images/original/000/772/356/76e.gif" />
        <img src="https://i.kym-cdn.com/photos/images/original/000/818/318/e12.gif" />
    </div>
</div>
</body>
</html>
