<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles/index.css">  
</head>   
<body>
<div class="header">
    <h1>
        Happy Black History Month! 
    </h1>
</div>
<div class="page-wrapper">
    <div class="custom-controls"=>
        <div class="audio">
            <audio id="song" src="assets/koven-Never_Have_I_Felt_This[NCS].mp3" crossorigin="anonymous">
        </div>
        <button data-playing="false" role="switch" aria-checked="false">
            <span>Play/Pause</span>
        </button>
        <input type="range" id="volume" min="0" max="2" value="1" step="0.01" list="gain-vals"/>
            <label for="volume">VOL</label>
        <input type="range" id="panner" min="-1" max="1" value="0" step="0.01" list="pan-vals"/>
            <label for="pan">PAN</label>
        <canvas id="audio-monitor" width="300" height="300">
            An alternative text describing what your canvas displays. 
        </canvas>
    </div>
  
    <div>
        <img src=" https://i.pinimg.com/originals/2b/6c/69/2b6c69c2c6fd2bd7c091696efbe57235.jpg"/>
        <img src="https://derpicdn.net/img/view/2012/10/14/121883__safe_solo_animated_edit_hub+logo_sonic+rainboom_avatar+the+last+airbender_avatar_atomic+rainboom_mushroom+cloud.gif"/>
        <img src="http://38.media.tumblr.com/a97e6b21873a97ca580d623be4cf8b18/tumblr_ngtsibBmkL1qcgu0vo4_500.gif"/>
        <img src="https://i.pinimg.com/originals/89/4e/78/894e7867687cfc70b8b7f05a955091ee.gif"/>
        <img src="https://animatedmeta.files.wordpress.com/2015/02/avatarintro.gif"/>
        <img src="https://media2.giphy.com/media/A4i2dzfc52Sli/giphy.gif"/>
        <img src="https://i.pinimg.com/originals/fc/2b/9f/fc2b9f50e7bcb12d897d0c4cd358b76e.gif"/>
        <img src="https://media.tenor.co/images/f234f7dab3ca899f230aebb3efb90c91/raw"/>
        <img src="https://i.kym-cdn.com/photos/images/original/000/772/356/76e.gif" />
        <img src="https://i.kym-cdn.com/photos/images/original/000/818/318/e12.gif" />
    </div>
</div>
</body>
<script>
// Only use connect once because its like different connections
// http-server -c-1
window.onload = function() {
    const templateAudioContext = window.AudioContext || window.webkitAudioContext;
    var audioContext = new templateAudioContext();
    var analyser = audioContext.createAnalyser();

    const audioElement = document.querySelector('audio');
    audioElement.play().then(response =>{
        console.log(response);
    }).catch(e => {
        console.log(e);
    });

    const track = audioContext.createMediaElementSource(audioElement);
    
    // select our play button
    const playButton = document.querySelector('button');

    playButton.addEventListener('click', function() {
        // check if context is in suspended state (autoplay policy)
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }

        // play or pause track depending on state
        if (this.dataset.playing === 'false') {
            audioElement.play();
            this.dataset.playing = 'true';
        } else if (this.dataset.playing === 'true') {
            audioElement.pause();
            this.dataset.playing = 'false';
        }

    }, false);

    // ended audio listener
    audioElement.addEventListener('ended', () => {
        playButton.dataset.playing = 'false';
    }, false);

    // add volume control 
    const gainNode = audioContext.createGain();
    const volumeControl = document.querySelector('#volume');
    volumeControl.addEventListener('input', function() {
        gainNode.gain.value = this.value;
    }, false);

    // panning 
    const pannerOptions = { pan: 0 };
    const panner = new StereoPannerNode(audioContext, pannerOptions);
    const pannerControl = document.querySelector('#panner');
    pannerControl.addEventListener('input', function() {
        panner.pan.value = this.value;
    }, false);

    // analyzer code 
    analyser.fftSize = 2048;
    var bufferLength = analyser.frequencyBinCount;
    var dataArray = new Uint8Array(bufferLength);
    analyser.getByteTimeDomainData(dataArray);
    analyser.minDecibels = -120;
    analyser.maxDecibels = 10;

    // Wire it up
    track.connect(analyser).connect(gainNode).connect(panner).connect(audioContext.destination);
    // Get a canvas defined with ID "oscilloscope"
    var canvas = document.getElementById("audio-monitor");
    var canvasCtx = canvas.getContext("2d");

    // draw an oscilloscope of the current audio source
    function draw() {
        requestAnimationFrame(draw);
        analyser.getByteTimeDomainData(dataArray);
        canvasCtx.fillStyle = "rgb(200, 200, 200)";
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

        canvasCtx.lineWidth = 2;
        canvasCtx.strokeStyle = "rgb(0, 0, 0)";

        canvasCtx.beginPath();

        var sliceWidth = canvas.width * 1.0 / bufferLength;
        var x = 0;
        for (var i = 0; i < bufferLength; i++) {
            var v = dataArray[i] / 128.0;
            var y = v * canvas.height / 2;

            if (i === 0) {
            canvasCtx.moveTo(x, y);
            } else {
            canvasCtx.lineTo(x, y);
            }

            x += sliceWidth;
        }
        canvasCtx.lineTo(canvas.width, canvas.height / 2);
        canvasCtx.stroke();
    }
    draw();
}
</script>
</html>
